name: Refresh Boulder data

# Weekly (Sun 06:00 UTC) + manual. Re-runs the ETL script against the City of
# Boulder open dataset and commits the refreshed aggregate if it changed, which
# triggers a Vercel redeploy. Station coordinates are reused from the committed
# file, so no geocoding is needed in CI.
on:
  schedule:
    - cron: "0 6 * * 0"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Fetch + aggregate Boulder sessions data
        run: node scripts/fetch-boulder.mjs
      - name: Fetch public station inventory (Colorado AFDC)
        run: node scripts/fetch-stations.mjs
      - name: Commit if changed
        run: |
          if [ -n "$(git status --porcelain src/data/)" ]; then
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add src/data/boulder-data.json src/data/boulder-stations.json
            git commit -m "chore: weekly refresh of Boulder datasets"
            git push
          else
            echo "No data changes."
          fi
