name: Refresh datasets

# Weekly (Sun 06:00 UTC) + manual. Re-runs the ETL scripts against the City of
# Boulder and City of Palo Alto open datasets and commits the refreshed
# aggregates if they changed, which triggers a Vercel redeploy. Boulder station
# coordinates are reused from the committed file (no geocoding in CI); Palo Alto
# ships real coordinates.
on:
  schedule:
    - cron: "0 6 * * 0"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Fetch + aggregate Boulder sessions data
        run: node scripts/fetch-boulder.mjs
      - name: Fetch + aggregate Palo Alto sessions data
        run: node scripts/fetch-paloalto.mjs
      - name: Commit if changed
        run: |
          if [ -n "$(git status --porcelain src/data/)" ]; then
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add src/data/boulder-data.json src/data/palo-alto-data.json
            git commit -m "chore: weekly refresh of Boulder + Palo Alto datasets"
            git push
          else
            echo "No data changes."
          fi
